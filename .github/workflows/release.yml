name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg-target: node20-linux-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            pkg-target: node20-macos-arm64

          - os: macos-13
            target: x86_64-apple-darwin
            pkg-target: node20-macos-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg-target: node20-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries
        shell: bash

      - name: Bundle API binary
        run: |
          OUTFILE="../../src-tauri/binaries/api-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            OUTFILE="${OUTFILE}.exe"
          fi
          npx --yes @yao-pkg/pkg . --targets ${{ matrix.pkg-target }} --output "${OUTFILE}"
          # Create symlink for Tauri bundler
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "${OUTFILE}" "../../src-tauri/binaries/api.exe"
          else
            cp "${OUTFILE}" "../../src-tauri/binaries/api"
          fi
          # Verify binary was created
          if [ -f "../../src-tauri/binaries/api" ]; then
            ls -lh "../../src-tauri/binaries/api"
          else
            echo "ERROR: Binary not found at ../../src-tauri/binaries/api"
            ls -lh ../../src-tauri/binaries/ || echo "binaries dir not found"
          fi
        working-directory: apps/api
        shell: bash

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Claude Code Desktop ${{ github.ref_name }}'
          releaseBody: 'Veja os assets abaixo para baixar esta versão.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Fix macOS app signature and repackage
        if: runner.os == 'macOS'
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP="$BUNDLE_DIR/Claude Code Desktop.app"
          TAR_GZ="$BUNDLE_DIR/Claude Code Desktop.app.tar.gz"

          if [ -d "$APP" ]; then
            codesign --remove-signature "$APP" 2>/dev/null || true
            codesign -s - "$APP" -f

            if [ -f "$TAR_GZ" ]; then
              rm "$TAR_GZ"
              cd "$BUNDLE_DIR"
              tar -czf "Claude Code Desktop.app.tar.gz" "Claude Code Desktop.app"
              echo "✅ App signature fixed and repackaged"
            fi
          fi

      - name: Copy API binary into app bundle
        run: |
          APP_MACOS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Claude Code Desktop.app/Contents/MacOS"
          API_BIN="src-tauri/binaries/api"
          if [ -f "$API_BIN" ] && [ -d "$APP_MACOS_DIR" ]; then
            cp "$API_BIN" "$APP_MACOS_DIR/api"
            echo "API binary copied to app bundle"
            ls -lh "$APP_MACOS_DIR/api"
          else
            echo "ERROR: API binary or app directory not found"
            ls -lh src-tauri/binaries/ || echo "binaries dir missing"
            ls -d "src-tauri/target/${{ matrix.target }}/release/bundle/macos"* 2>/dev/null || echo "app dir missing"
          fi
        shell: bash
