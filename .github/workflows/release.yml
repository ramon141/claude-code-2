name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg-target: node20-linux-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            pkg-target: node20-macos-arm64

          - os: macos-13
            target: x86_64-apple-darwin
            pkg-target: node20-macos-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg-target: node20-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries
        shell: bash

      - name: Bundle API binary
        run: |
          OUTFILE="../../src-tauri/binaries/api-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            OUTFILE="${OUTFILE}.exe"
          fi
          npx --yes @yao-pkg/pkg . --targets ${{ matrix.pkg-target }} --output "${OUTFILE}"
        working-directory: apps/api
        shell: bash

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'Claude Code Desktop ${{ github.ref_name }}'
          releaseBody: 'Veja os assets abaixo para baixar esta versão.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
